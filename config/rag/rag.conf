[daemon]
# HTTP API bind address and port
http_host = 127.0.0.1
http_port = 7700

# ChromaDB persistent store location
chroma_path = /var/lib/boostos/rag/chroma

# Directory where embedding model weights are cached
models_path = /var/lib/boostos/rag/models

# JSON file listing watched directories (managed by boostos-rag watch add/remove)
watch_config_path = /var/lib/boostos/rag/config.json

# Sentence-Transformers model to use for embeddings
# all-MiniLM-L6-v2 is 22MB, CPU-only, and fast
embedding_model = all-MiniLM-L6-v2

# Log level: DEBUG | INFO | WARNING | ERROR
log_level = INFO
